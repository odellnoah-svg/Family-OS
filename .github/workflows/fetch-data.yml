name: Sync Notion Data

# Runs every 4 hours and on manual trigger.
# To run manually: GitHub repo → Actions → Sync Notion Data → Run workflow

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # manual trigger button in GitHub Actions UI

permissions:
  contents: write             # needed to commit data.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Node 20 has fetch built in, no npm install needed

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node fetch-data.js

      - name: Commit and push data.json
        run: |
          git config --global user.name  "Notion Sync"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: sync Notion data [skip ci]"
          git pull --rebase origin main
          git push
