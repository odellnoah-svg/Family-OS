<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eubanks Family OS · Strategic Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F2EB;--surf:#FDFAF6;--surf2:#EDE6DA;--bdr:#DDD4C4;--tx:#261C10;--tx2:#7A6A54;--tx3:#B0A08C;--acc:#7C5738;--strategic:#2D4878;--execution:#2A6044;--stewardship:#574880;--arch-bg:#F4F0EA;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--arch-bg);z-index:100;}
.sc-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:6px;}
.sc-sub{font-size:13px;color:var(--tx2);margin-bottom:28px;}
.dots{display:flex;gap:7px;}.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:blink 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}
.info-box{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:36px 40px;max-width:440px;text-align:center;}
.ib-icon{font-size:28px;margin-bottom:12px;}.ib-head{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:8px;}
.ib-body{font-size:13px;color:var(--tx2);line-height:1.65;}.ib-steps{text-align:left;margin-top:16px;}
.ib-steps li{font-size:12.5px;color:var(--tx2);margin-bottom:5px;line-height:1.5;}.ib-steps strong{color:var(--tx);}
/* App */
#app{display:flex;flex-direction:column;height:100vh;}
header{flex-shrink:0;}
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
.hdr-brand{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.hdr-brand em{font-weight:400;font-style:italic;color:var(--tx2);}
.area-tabs{display:flex;gap:5px;flex:1;justify-content:center;}
.atab{padding:7px 20px;border:1.5px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .14s;letter-spacing:.01em;}
.atab:hover{background:var(--surf2);color:var(--tx);}
.atab.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.sub-hdr{background:var(--surf);border-bottom:1px solid var(--bdr);height:36px;display:flex;align-items:center;padding:0 20px;gap:5px;flex-shrink:0;}
.stab{padding:4px 13px;border:1px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;}
.stab:hover{background:var(--surf2);color:var(--tx);}
.stab.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.updated{font-size:10px;color:var(--tx3);white-space:nowrap;}
.hdr-btn{padding:5px 10px;border:1px solid var(--bdr);border-radius:7px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;}
.hdr-btn:hover{background:var(--surf2);color:var(--tx);}
#vc{flex:1;overflow:hidden;position:relative;}
/* Shared */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.sec-hdr:not(:first-child){margin-top:32px;}
.sec-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--bdr);}
.sec-cnt{font-size:11px;color:var(--tx3);}
.chip{font-size:11px;padding:4px 10px;background:var(--surf2);border-radius:20px;color:var(--tx2);}
.chip-c{font-size:11px;padding:4px 10px;border-radius:20px;color:#fff;opacity:.92;}
.chip-items{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.tag{font-size:9.5px;font-weight:500;padding:2px 7px;border-radius:20px;}
.t-g{background:#E6F4EE;color:#2A7050;}.t-y{background:#FFF3E0;color:#B06820;}.t-r{background:#FFEEED;color:#A83428;}
.t-b{background:#EBF2FB;color:#2C5FA0;}.t-n{background:var(--surf2);color:var(--tx2);}.t-s{background:#EDF0F2;color:#4A6070;}
/* ── GUIDE ─────────────────────────────────────────────── */
.vguide{height:100%;overflow-y:auto;background:var(--arch-bg);}
.arch{max-width:760px;margin:0 auto;padding:32px 40px 48px;}
.arch-title-block{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #E0D8CC;}
.arch-diamond{font-size:13px;color:#8A7A60;margin-bottom:8px;letter-spacing:4px;}
.arch-h1{font-family:'Playfair Display',serif;font-size:27px;font-weight:700;color:#1A2540;line-height:1.2;margin-bottom:8px;}
.arch-tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:#6A7A8A;}
.arch-section{display:flex;gap:13px;margin-bottom:5px;}
.arch-slabel{width:126px;flex-shrink:0;border-radius:12px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.arch-slabel-icon-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 9px;}
.arch-slabel.strategic .arch-slabel-icon-circle{background:var(--strategic);}
.arch-slabel.execution .arch-slabel-icon-circle{background:var(--execution);}
.arch-slabel.stewardship .arch-slabel-icon-circle{background:var(--stewardship);}
.arch-slabel-name{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;line-height:1.3;margin-bottom:5px;}
.arch-slabel-desc{font-size:11px;line-height:1.45;opacity:.9;}
.arch-slabel.strategic{background:#EBF0F8;border:2px solid var(--strategic);color:var(--strategic);}
.arch-slabel.execution{background:#E8F4EE;border:2px solid var(--execution);color:var(--execution);}
.arch-slabel.stewardship{background:#EEE8F6;border:2px solid var(--stewardship);color:var(--stewardship);}
.arch-boxes{flex:1;display:flex;flex-direction:column;}
.arch-box{background:#FFF;border:1px solid #D8D0C4;border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 8px rgba(30,37,64,.06);}
.arch-box-icon-wrap{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.arch-box.strategic .arch-box-icon-wrap{background:#EBF0F8;}
.arch-box.execution .arch-box-icon-wrap{background:#E8F4EE;}
.arch-box-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;}
.arch-box-title.strategic{color:var(--strategic);}.arch-box-title.execution{color:var(--execution);}
.arch-box-desc{font-size:12.5px;color:#363D45;line-height:1.5;}
.arch-goals-box{flex-direction:column;}
.arch-goals-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px;}
.arch-sub-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.arch-sub-box{background:#F7F4F0;border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:8px;}
.arch-sub-box.outcomes{border-left:3px solid var(--strategic);}
.arch-sub-box.annuals{border-left:3px solid #8A6C5C;}
.arch-sub-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.arch-sub-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;color:#1A2540;}
.arch-sub-desc{font-size:12px;color:#363D45;line-height:1.45;}
.arch-arrow{text-align:center;font-size:15px;color:#B0A090;padding:3px 0;}
.arch-section-arrow{text-align:center;font-size:17px;color:#B0A090;padding:5px 0;margin-left:139px;}
.arch-pillar-wrap{flex:1;}
.arch-pillar-header-box{background:#FFF;border:1px solid #D8D0C4;border-radius:10px;padding:12px 13px 11px;box-shadow:0 2px 7px rgba(30,37,64,.05);}
.arch-pillar-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stewardship);text-align:center;margin-bottom:4px;}
.arch-pillar-subtitle{font-size:12px;color:#363D45;text-align:center;line-height:1.5;margin-bottom:12px;}
.arch-grid{display:grid;grid-template-columns:90px repeat(7,1fr);gap:3px;}
.arch-grid-corner{background:transparent;}
.arch-grid-ph{border-radius:6px 6px 0 0;padding:6px 3px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.arch-grid-ph-icon{font-size:13px;}.arch-grid-ph-name{font-size:7.5px;font-weight:700;color:#fff;line-height:1.25;}
.arch-grid-rl{background:#EEE8F6;border:1px solid #C8BAD8;border-radius:5px 0 0 5px;padding:5px 8px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--stewardship);display:flex;align-items:center;}
.arch-grid-cell{background:#F8F5FC;border:1px solid #DDD4EE;height:21px;}
.arch-grid-cell:last-child{border-radius:0 3px 3px 0;}
.arch-callouts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:15px;}
.arch-callout{background:#FFF;border:1px solid #D8D0C4;border-radius:10px;padding:13px 15px;box-shadow:0 2px 7px rgba(30,37,64,.04);}
.arch-callout-icon{font-size:19px;margin-bottom:6px;}
.arch-callout-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#1A2540;margin-bottom:5px;}
.arch-callout-body{font-size:12.5px;color:#363D45;line-height:1.6;}
.arch-callout-row{display:flex;align-items:center;gap:7px;margin-top:6px;font-size:12px;color:#363D45;}
.arch-callout-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.arch-cta{text-align:center;margin-top:26px;}
.arch-cta-btn{display:inline-block;padding:12px 34px;background:#1A2540;color:#FAF6F0;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:background .15s;}
.arch-cta-btn:hover{background:var(--strategic);}
/* ── STRATEGIC ──────────────────────────────────────────── */
.vstr{height:100%;overflow-y:auto;padding:24px 28px 52px;background:var(--bg);}
.vstr-inner{max-width:1100px;margin:0 auto;}
.vstr-grid{display:grid;grid-template-columns:1fr 232px;gap:24px;align-items:start;}
.vstr-cascade{display:flex;flex-direction:column;gap:0;}
.vstr-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:0;}
.vstr-card.vis{border-left:4px solid var(--acc);}
.vstr-card-hd{padding:12px 18px 11px;background:var(--surf2);border-bottom:1px solid var(--bdr);}
.vstr-card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--tx);}
.vstr-body{padding:14px 18px;font-size:13px;color:var(--tx);line-height:1.65;}
.vstr-para{margin-bottom:7px;}
.vstr-bhead{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--tx);margin:10px 0 5px;}
.vstr-bullet{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px;}
.vstr-bdot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:7px;}
.vstr-btext{flex:1;line-height:1.55;}
.vstr-ph{font-style:italic;color:var(--tx3);font-size:13px;}
.vstr-arrow{text-align:center;padding:6px 0;color:var(--tx3);font-size:16px;}
.vstr-sidebar{}
.vstr-side-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:10px;}
.vstr-p-card{background:var(--surf);border:1px solid var(--bdr);border-left:4px solid var(--pc,var(--bdr));border-radius:9px;padding:9px 12px;margin-bottom:6px;}
.vstr-p-name{font-size:12px;font-weight:500;color:var(--tx);display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.vstr-p-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.vstr-p-meta{font-size:10.5px;color:var(--tx3);display:flex;align-items:center;gap:5px;}
/* ── EXECUTION ──────────────────────────────────────────── */
.vexe{height:100%;overflow-y:auto;padding:24px 28px 52px;background:var(--bg);}
.vexe-inner{max-width:1100px;margin:0 auto;}
.vexe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.vexe-rock{background:var(--surf);border:1px solid var(--bdr);border-left:4px solid var(--pc,var(--bdr));border-radius:11px;padding:13px 15px;cursor:pointer;transition:box-shadow .14s;}
.vexe-rock:hover{box-shadow:0 3px 12px rgba(38,28,16,.09);}
.vexe-rock-k{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:3px;}
.vexe-rock-n{font-size:13.5px;font-weight:500;line-height:1.4;color:var(--tx);margin-bottom:8px;}
.vexe-rock-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.vexe-rock-goal{font-size:11px;color:var(--tx2);padding-top:7px;border-top:1px solid var(--bdr);}
.vexe-proj{background:var(--surf);border:1px solid var(--bdr);border-left:4px solid var(--pc,var(--bdr));border-radius:11px;padding:13px 15px;}
.vexe-proj-k{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:3px;}
.vexe-proj-n{font-size:13.5px;font-weight:500;line-height:1.4;color:var(--tx);margin-bottom:8px;}
.vexe-proj-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.vexe-proj-next{font-size:11.5px;color:var(--tx2);padding-top:7px;border-top:1px solid var(--bdr);line-height:1.4;}
.vexe-tasks-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.vexe-tasks-col-hdr{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr);}
.vexe-task{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.vexe-task:last-child{border-bottom:none;}
.vexe-task-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.vexe-task-n{font-size:12px;color:var(--tx);flex:1;line-height:1.35;}
.vexe-task-tags{display:flex;gap:3px;flex-shrink:0;}
.vexe-more{font-size:11px;color:var(--tx3);font-style:italic;padding:8px 0;}
/* ── PILLARS ────────────────────────────────────────────── */
.vpil{display:flex;height:100%;overflow-x:auto;overflow-y:hidden;}
.vpil-lane{min-width:186px;flex:1;display:flex;flex-direction:column;border-right:1px solid var(--bdr);}
.vpil-lane:last-child{border-right:none;}
.vpil-hdr{padding:11px 12px 9px;border-bottom:1px solid var(--bdr);background:var(--surf);border-top:4px solid var(--pc,var(--bdr));flex-shrink:0;position:sticky;top:0;z-index:5;}
.vpil-name{font-size:11px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:5px;}
.vpil-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.vpil-body{padding:9px;background:var(--bg);flex:1;overflow-y:auto;}
.vpil-grp{margin-bottom:10px;}
.vpil-glbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px;}
.vpil-item{font-size:11px;color:var(--tx);padding:5px 8px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;margin-bottom:3px;line-height:1.38;}
.vpil-item.outcome{border-left:2px solid var(--pc,var(--bdr));}
.vpil-item-sm{font-size:10px;color:var(--tx2);padding:4px 8px;background:var(--bg);border:1px solid var(--bdr);border-radius:5px;margin-bottom:3px;line-height:1.38;}
.vpil-empty{font-size:10px;color:var(--tx3);font-style:italic;padding:4px 0;}
/* ── WIP DASHBOARD ──────────────────────────────────────── */
.vwip-person-tabs{display:flex;gap:6px;margin-bottom:12px;}
.vwip-ptab{padding:7px 20px;border:1.5px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .14s;}
.vwip-ptab:hover{background:var(--surf2);color:var(--tx);}
.vwip-ptab.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.vwip-ptab-ct{font-size:10px;opacity:.7;margin-left:4px;}
.vwip-diag{font-size:11px;color:#B06820;background:#FFF3E0;border:1px solid #E8C890;border-radius:7px;padding:4px 10px;margin-left:8px;}
.vwip{height:100%;overflow-y:auto;padding:20px 24px 52px;background:var(--bg);}
.vwip-inner{max-width:1100px;margin:0 auto;}
.vwip-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.vwip-toolbar-lbl{font-size:11px;font-weight:500;color:var(--tx2);margin-right:2px;}
.vwip-rbtn{padding:4px 11px;border:1px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--tx2);cursor:pointer;transition:all .12s;}
.vwip-rbtn:hover{background:var(--surf2);}.vwip-rbtn.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.vwip-rdatelbl{font-size:11px;color:var(--tx3);margin-left:6px;}
.vwip-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px;}
.vwip-metric{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:14px 16px;}
.vwip-metric.warn{border-color:#D4905A;background:#FFF8F3;}
.vwip-mval{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--tx);line-height:1;margin-bottom:5px;}
.vwip-mtgt{font-size:14px;font-weight:400;color:var(--tx3);}
.vwip-mlbl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.vwip-msub{font-size:10.5px;color:var(--tx3);}
.vwip-prog-track{height:5px;background:var(--surf2);border-radius:3px;margin-top:8px;overflow:hidden;}
.vwip-prog-fill{height:100%;background:#4A8B70;border-radius:3px;transition:width .3s;}
.vwip-mval.over{color:#C03030!important;font-weight:700;}
.vwip-mval.under{color:#C03030!important;font-weight:700;}
.vwip-mval.hit{color:#2A7050!important;font-weight:700;}
.vwip-prog-fill.over{background:#C03030;}
.vwip-prog-fill.under{background:#C03030;}
.vwip-chart-box{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:16px 18px;margin-bottom:14px;}
.vwip-chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:14px;}
.vwip-chart-sub{font-weight:400;color:var(--tx3);font-size:11px;}
.vwip-bar-wrap{height:220px;position:relative;}
.vwip-bottom{display:grid;grid-template-columns:1fr 1fr 190px;gap:12px;margin-bottom:14px;}
.vwip-pie-box{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:16px 18px;}
.vwip-pie-wrap{height:200px;position:relative;}
.vwip-stat-box{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:16px 18px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.vwip-stat-big{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:var(--tx);line-height:1;margin-bottom:8px;}
.vwip-stat-lbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.vwip-stat-sub{font-size:11px;color:var(--tx3);}
.vwip-stag-list{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;}
.vwip-stag-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);}
.vwip-stag-row:last-child{border-bottom:none;}
.vwip-stag-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.vhab-rbtn:hover{background:var(--surf2);}.vhab-rbtn.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}

.vhab-metrics{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.vhab-metric{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:14px 16px;}
.vhab-mval{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:5px;}
.vhab-mlbl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.vhab-msub{font-size:10.5px;color:var(--tx3);}
.vhab-score{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:14px 16px;}

      <div class="arch-arrow">↓</div>
      <div class="arch-box execution"><div class="arch-box-icon-wrap" style="background:#E8F4EE"><span style="font-size:19px">🧩</span></div><div><div class="arch-box-title execution">Projects</div><div class="arch-box-desc">The multi-step work required to complete Rocks or Goals.</div></div></div>
      <div class="arch-arrow">↓</div>
      <div class="arch-box execution"><div class="arch-box-icon-wrap" style="background:#E8F4EE"><span style="font-size:19px">✅</span></div><div><div class="arch-box-title execution">Tasks</div><div class="arch-box-desc">Specific next actions that drive execution. Managed in the Master Backlog.</div></div></div>
    </div>

<script>
const PC={'Faith & Character':'#7B6FAC','Marriage & Family':'#B5695A','Health & Energy':'#4A8B70','Home/Homestead':'#A07848','Freedom & Ownership':'#4A7BAD','Systems & Simplicity':'#6E8C8A','Adventure & Community':'#C48B3A'}
let D={pillars:[],goals:[],rocks:[],projects:[],tasks:[],wipTasks:[],habitData:null},ALL={},CV='strategic',CV_AREA='strategic',WIP_RANGE='week',WIP_PERSON='all',WIP_MODE='hours',HAB_PERSON='noah',HAB_MONTH=new Date().getMonth(),HAB_YEAR=new Date().getFullYear()

window.addEventListener('DOMContentLoaded',init)
async function init(){so('scr-loading');try{await load();so('app');renderHdr();sv('strategic')}catch(e){if(e.message==='NO_DATA')so('scr-nodata');else{document.getElementById('err-msg').textContent=e.message;so('scr-error')}}}
async function reload(){so('scr-loading');try{await load();so('app');renderHdr();sv(CV)}catch(e){if(e.message==='NO_DATA')so('scr-nodata');else{document.getElementById('err-msg').textContent=e.message;so('scr-error')}}}
function so(id){['scr-loading','scr-nodata','scr-error','app'].forEach(s=>document.getElementById(s).hidden=s!==id)}

async function load(){
  const res=await fetch('./data.json?v='+Date.now())
  if(!res.ok)throw new Error('data.json not found (HTTP '+res.status+')')
  const data=await res.json()
  if(!data.generated)throw new Error('NO_DATA')
  D={pillars:data.pillars||[],goals:data.goals||[],rocks:data.rocks||[],projects:data.projects||[],tasks:data.tasks||[],wipTasks:data.wipTasks||[],habitData:data.habitData||null,meta:data.meta||{},_ts:data.generated,_hasWip:'wipTasks' in data,_hasHabits:'habitData' in data}
  colorize()
}
function colorize(){
  const pm=by(D.pillars),gm=by(D.goals),rm=by(D.rocks),prm=by(D.projects)
  D.pillars.forEach(p=>{p.type='pillar';p.color=PC[p.name]||'#8B7355';p.pc=p.color})
  D.goals.forEach(g=>{g.type='goal';const a=g.pillarIds?.map(i=>pm[i]).find(Boolean),b=D.pillars.find(p=>p.goalIds?.includes(g.id));g.pc=(a||b)?.color||'#8B7355'})
  D.rocks.forEach(r=>{r.type='rock';const a=r.pillarIds?.map(i=>pm[i]).find(Boolean),b=r.goalIds?.map(i=>gm[i]).find(Boolean),c=D.goals.find(g=>g.rockIds?.includes(r.id));r.pc=a?.color||b?.pc||c?.pc||'#8B7355'})
  D.projects.forEach(pr=>{pr.type='project';const a=pr.rockIds?.map(i=>rm[i]).find(Boolean),b=D.rocks.find(r=>r.projectIds?.includes(pr.id));pr.pc=(a||b)?.pc||'#8B7355'})
  D.tasks.forEach(t=>{t.type='task';const a=t.projectIds?.map(i=>prm[i]).find(Boolean),b=D.projects.find(p=>p.taskIds?.includes(t.id));t.pc=a?.pc||b?.pc||PC[t.pillar]||'#8B7355'})
  D.wipTasks.forEach(t=>{t.type='task';const a=t.projectIds?.map(i=>prm[i]).find(Boolean);t.pc=a?.pc||PC[t.pillar]||'#8B7355'})
  ALL={...by(D.pillars),...by(D.goals),...by(D.rocks),...by(D.projects),...by(D.tasks)}
}
const by=arr=>Object.fromEntries(arr.map(x=>[x.id,x]))
const goalsOf=p=>D.goals.filter(g=>p.goalIds?.includes(g.id)||g.pillarIds?.includes(p.id))
const rocksOf=g=>D.rocks.filter(r=>g.rockIds?.includes(r.id)||r.goalIds?.includes(g.id))
const projsOf=r=>D.projects.filter(p=>r.projectIds?.includes(p.id)||p.rockIds?.includes(r.id))
const stag=s=>{const sc=s=>({'Healthy':'t-g','On Track':'t-g','Complete':'t-g','Needs Attention':'t-y','At Risk':'t-y','Paused':'t-y','Neglected':'t-r','Dropped':'t-r','Active':'t-b','Not Started':'t-n'})[s]||'t-n';return s?`<span class="tag ${sc(s)}">${s}</span>`:''}
const trunc=(s,n)=>s&&s.length>n?s.slice(0,n)+'…':(s||'')
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function renderHdr(){if(D._ts){const d=new Date(D._ts);document.getElementById('updated-ts').textContent=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}}

const VIEW_AREA={guide:'strategic',strategic:'strategic',pillars:'strategic',execution:'execution',wip:'metrics',habits:'metrics',finance:'metrics'}
const AREA_VIEWS={strategic:[['guide','Guide'],['strategic','Roadmap'],['pillars','Pillars']],execution:[['execution','Execution']],metrics:[['wip','WIP'],['habits','Habits'],['finance','Finance']]}
const AREA_DEFAULTS={strategic:'strategic',execution:'execution',metrics:'wip'}

function setArea(a){sv(AREA_DEFAULTS[a]||a)}

function sv(name){
  CV=name
  const area=VIEW_AREA[name]
  if(area)CV_AREA=area
  // Area tabs
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('on'))
  if(area)document.querySelector(`.atab[data-area="${area}"]`)?.classList.add('on')
  // Sub-tabs
  const subHdr=document.getElementById('sub-hdr')
  const views=area?AREA_VIEWS[area]||[]:[]
  if(views.length>1){
    subHdr.hidden=false
    subHdr.innerHTML=views.map(([v,l])=>`<button class="stab ${CV===v?'on':''}" onclick="sv('${v}')">${l}</button>`).join('')
  } else {
    subHdr.hidden=true
  }
  // Render view
  ;({guide:vGuide,strategic:vStrategic,execution:vExe,pillars:vPil,wip:vWip,habits:vHab,finance:vFin})[name]?.()
}

// ── GUIDE ──────────────────────────────────────────────────
function vGuide(){const vc=document.getElementById('vc');vc.innerHTML='';vc.appendChild(document.getElementById('tguide').content.cloneNode(true))}

// ── STRATEGIC ──────────────────────────────────────────────
function vStrategic(){
  const meta=D.meta||{},outcomes=D.goals.filter(g=>g.horizon==='3-Year'),annual=D.goals.filter(g=>g.horizon==='1-Year')
  let h=`<div class="vstr"><div class="vstr-inner"><div class="sec-hdr"><span class="sec-lbl">Strategic Layer</span><div class="sec-line"></div></div><div class="vstr-grid"><div class="vstr-cascade">`
  h+=vsCard('10-Year Target',true,vsBlocks(meta.tenYearTarget))
  h+=`<div class="vstr-arrow">↓</div>`
  h+=vsCard('3-Year Vision',true,vsBlocks(meta.threeYearVision))
  h+=`<div class="vstr-arrow">↓</div>`
  const outHtml=outcomes.length?`<div class="chip-items">${outcomes.map(g=>`<span class="chip-c" style="background:${g.pc}">${g.name}</span>`).join('')}</div>`:`<div class="vstr-ph">No 3-Year Outcomes yet — add goals with Goal Horizon = "3-Year" in Notion.</div>`
  h+=vsCard(`3-Year Outcomes · ${outcomes.length}`,false,outHtml)
  h+=`<div class="vstr-arrow">↓</div>`
  const annHtml=annual.length?`<div class="chip-items">${annual.map(g=>`<span class="chip-c" style="background:${g.pc}">${g.name}</span>`).join('')}</div>`:`<div class="vstr-ph">No annual goals found.</div>`
  h+=vsCard(`Annual Goals · ${annual.length}`,false,annHtml)
  h+=`</div><div class="vstr-sidebar"><div class="vstr-side-title">Pillar Stewardship</div>`
  D.pillars.forEach(p=>{
    const pg=goalsOf(p).length,meta2=D.meta||{},cQ=meta2.currentQuarter||'Q2',cY=meta2.currentYear||'2026'
    const pr=D.rocks.filter(r=>r.quarters?.includes(cQ)&&r.year===cY&&(r.pillarIds?.includes(p.id)||goalsOf(p).some(g=>r.goalIds?.includes(g.id)||g.rockIds?.includes(r.id)))).length
    h+=`<div class="vstr-p-card" style="--pc:${p.color};border-left-color:${p.color}"><div class="vstr-p-name"><span class="vstr-p-pip" style="background:${p.color}"></span>${p.name}</div><div class="vstr-p-meta">${pg} goal${pg!==1?'s':''} · ${pr} rock${pr!==1?'s':''} ${stag(p.status)}</div></div>`
  })
  h+=`</div></div></div></div>`
  document.getElementById('vc').innerHTML=h
}
function vsCard(title,isVis,body){return`<div class="vstr-card ${isVis?'vis':''}"><div class="vstr-card-hd"><div class="vstr-card-title">${title}</div></div><div class="vstr-body">${body}</div></div>`}
function vsBlocks(blocks){
  if(!blocks?.length)return`<div class="vstr-ph">Not yet populated — update the Notion page to show content here.</div>`
  return blocks.filter(b=>b.text.toLowerCase()!=='summary').slice(0,10).map(b=>{
    if(b.type==='bulleted_list_item'||b.type==='numbered_list_item')return`<div class="vstr-bullet"><div class="vstr-bdot"></div><div class="vstr-btext">${b.text}</div></div>`
    if(b.type.startsWith('heading'))return`<div class="vstr-bhead">${b.text}</div>`
    return`<div class="vstr-para">${trunc(b.text,300)}</div>`
  }).join('')
}

// ── EXECUTION ──────────────────────────────────────────────
function vExe(){
  const meta=D.meta||{},cQ=meta.currentQuarter||'Q2',cY=meta.currentYear||'2026'
  const qRocks=D.rocks.filter(r=>r.quarters?.includes(cQ)&&r.year===cY)
  const active=D.projects.filter(p=>p.status==='Active'||p.status==='Not Started')
  const wip=D.tasks.filter(t=>t.status==='In progress (WIP)'),next=D.tasks.filter(t=>t.status==='Up Next (Sprint Backlog)')
  const gm=by(D.goals)
  let h=`<div class="vexe"><div class="vexe-inner">`
  h+=`<div class="sec-hdr"><span class="sec-lbl">Quarterly Rocks</span><div class="sec-line"></div><span class="sec-cnt">${cQ} ${cY} · ${qRocks.length} rock${qRocks.length!==1?'s':''}</span></div>`
  if(qRocks.length){h+=`<div class="vexe-grid">`;qRocks.forEach(r=>{const gn=r.goalIds?.[0]?gm[r.goalIds[0]]?.name:'';h+=`<div class="vexe-rock" style="--pc:${r.pc}"><div class="vexe-rock-k">Rock</div><div class="vexe-rock-n">${r.name}</div><div class="vexe-rock-tags">${r.quarters?.length?`<span class="tag t-n">${r.quarters.join('/')}${r.year?' '+r.year:''}</span>`:''}</div>${gn?`<div class="vexe-rock-goal">→ ${gn}</div>`:''}</div>`});h+=`</div>`}
  else h+=`<div style="font-size:12px;color:var(--tx3);font-style:italic;margin-bottom:16px">No rocks for ${cQ} ${cY}.</div>`
  h+=`<div class="sec-hdr"><span class="sec-lbl">Active Projects</span><div class="sec-line"></div><span class="sec-cnt">${active.length}</span></div>`
  if(active.length){h+=`<div class="vexe-grid">`;active.forEach(p=>{h+=`<div class="vexe-proj" style="--pc:${p.pc}"><div class="vexe-proj-k">Project</div><div class="vexe-proj-n">${p.name}</div><div class="vexe-proj-tags">${stag(p.status)}</div>${p.nextAction?`<div class="vexe-proj-next">→ ${trunc(p.nextAction,80)}</div>`:''}</div>`});h+=`</div>`}
  const SHOW=20
  h+=`<div class="sec-hdr"><span class="sec-lbl">Active Tasks</span><div class="sec-line"></div><span class="sec-cnt">${wip.length} in WIP · ${next.length} up next</span></div>`
  h+=`<div class="vexe-tasks-row"><div><div class="vexe-tasks-col-hdr">In WIP (${wip.length})</div>`
  wip.slice(0,SHOW).forEach(t=>{h+=`<div class="vexe-task"><div class="vexe-task-pip" style="background:${t.pc}"></div><div class="vexe-task-n">${t.name}</div><div class="vexe-task-tags">${t.domain?`<span class="tag t-n">${trunc(t.domain,14)}</span>`:''} ${t.hours?`<span class="tag t-s">${t.hours}h</span>`:''}</div></div>`})
  if(wip.length>SHOW)h+=`<div class="vexe-more">+${wip.length-SHOW} more</div>`
  h+=`</div><div><div class="vexe-tasks-col-hdr">Up Next (${next.length})</div>`
  next.slice(0,SHOW).forEach(t=>{h+=`<div class="vexe-task"><div class="vexe-task-pip" style="background:${t.pc}"></div><div class="vexe-task-n">${t.name}</div><div class="vexe-task-tags">${t.domain?`<span class="tag t-n">${trunc(t.domain,14)}</span>`:''} ${t.hours?`<span class="tag t-s">${t.hours}h</span>`:''}</div></div>`})
  if(next.length>SHOW)h+=`<div class="vexe-more">+${next.length-SHOW} more</div>`
  h+=`</div></div></div></div>`
  document.getElementById('vc').innerHTML=h
}

// ── PILLARS ────────────────────────────────────────────────
function vPil(){
  const meta=D.meta||{},cQ=meta.currentQuarter||'Q2',cY=meta.currentYear||'2026'
  const outcomes=D.goals.filter(g=>g.horizon==='3-Year'),annual=D.goals.filter(g=>g.horizon==='1-Year')
  const qRocks=D.rocks.filter(r=>r.quarters?.includes(cQ)&&r.year===cY)
  let h=`<div class="vpil">`
  D.pillars.forEach(p=>{
    const pOut=outcomes.filter(g=>g.pillarIds?.includes(p.id)||p.goalIds?.includes(g.id))
    const pGoals=annual.filter(g=>g.pillarIds?.includes(p.id)||p.goalIds?.includes(g.id))
    const pRocks=qRocks.filter(r=>{if(r.pillarIds?.includes(p.id))return true;return goalsOf(p).some(g=>r.goalIds?.includes(g.id)||g.rockIds?.includes(r.id))})
    const pRockIds=new Set(pRocks.map(r=>r.id))
    const pProjs=D.projects.filter(pr=>pr.rockIds?.some(rid=>pRockIds.has(rid)))
    const has=pOut.length||pGoals.length||pRocks.length||pProjs.length
    h+=`<div class="vpil-lane" style="--pc:${p.color}"><div class="vpil-hdr"><div class="vpil-name"><span class="vpil-pip" style="background:${p.color}"></span>${p.name}</div></div><div class="vpil-body">`
    if(pOut.length)h+=`<div class="vpil-grp"><div class="vpil-glbl">3-Yr Outcomes</div>${pOut.map(g=>`<div class="vpil-item outcome" style="--pc:${p.color}">${trunc(g.name,55)}</div>`).join('')}</div>`
    if(pGoals.length)h+=`<div class="vpil-grp"><div class="vpil-glbl">Annual Goals</div>${pGoals.map(g=>`<div class="vpil-item">${trunc(g.name,55)}</div>`).join('')}</div>`
    if(pRocks.length)h+=`<div class="vpil-grp"><div class="vpil-glbl">Rocks · ${cQ}</div>${pRocks.map(r=>`<div class="vpil-item-sm">${trunc(r.name,52)}</div>`).join('')}</div>`
    if(pProjs.length)h+=`<div class="vpil-grp"><div class="vpil-glbl">Projects</div>${pProjs.map(pr=>`<div class="vpil-item-sm">${trunc(pr.name,52)}</div>`).join('')}</div>`
    if(!has)h+=`<div class="vpil-empty">Nothing this quarter</div>`
    h+=`</div></div>`
  })
  document.getElementById('vc').innerHTML=h+'</div>'
}

// ── WIP DASHBOARD ──────────────────────────────────────────
function setWipRange(r){WIP_RANGE=r;vWip()}
function setWipPerson(p){WIP_PERSON=p;vWip()}
function setWipMode(m){WIP_MODE=m;vWip()}
function setHabPerson(p){HAB_PERSON=p;vHab()}
function prevHabMonth(){HAB_MONTH--;if(HAB_MONTH<0){HAB_MONTH=11;HAB_YEAR--}vHab()}
function nextHabMonth(){const n=new Date();if(HAB_YEAR===n.getFullYear()&&HAB_MONTH>=n.getMonth())return;HAB_MONTH++;if(HAB_MONTH>11){HAB_MONTH=0;HAB_YEAR++}vHab()}

function getRange(r){
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate())
  if(r==='week'){const d=today.getDay()||7,s=new Date(today);s.setDate(today.getDate()-(d-1));return{start:s,end:today,label:'This Week'}}
  if(r==='lastweek'){const d=today.getDay()||7,e=new Date(today);e.setDate(today.getDate()-d);const s=new Date(e);s.setDate(e.getDate()-6);return{start:s,end:e,label:'Last Week'}}
  if(r==='14days'){const s=new Date(today);s.setDate(today.getDate()-13);return{start:s,end:today,label:'Last 14 Days'}}
  const s=new Date(today);s.setDate(today.getDate()-29);return{start:s,end:today,label:'Last 30 Days'}
}

async function vWip(){
  const vc=document.getElementById('vc')
  try{
    if(window.Chart){['wip-bar','wip-pie1','wip-pie2'].forEach(id=>{const c=Chart.getChart(id);if(c)c.destroy()})}
    if(!D._hasWip){
      vc.innerHTML=`<div class="vwip-nodata"><div style="font-size:36px">📊</div><div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--tx);margin-top:8px">WIP data not yet loaded</div><div style="font-size:13px;color:var(--tx2);max-width:360px;line-height:1.6;margin-top:8px">Re-run the GitHub Action to fetch extended task data, then reload this page.</div></div>`
      return
    }
    if(!window.Chart){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)})
      if(!window.Chart){vc.innerHTML=`<div class="vwip-nodata"><div>Could not load Chart.js — check network connection.</div></div>`;return}
    }
    renderWip()
  }catch(e){
    vc.innerHTML=`<div style="padding:32px;font-family:'DM Sans',sans-serif"><div style="font-size:13px;font-weight:600;color:#C03030;margin-bottom:8px">WIP Dashboard Error</div><div style="font-size:12px;color:var(--tx2);font-family:monospace;background:var(--surf2);padding:12px;border-radius:8px">${e.message}</div><div style="font-size:11px;color:var(--tx3);margin-top:8px">Check browser console for full details.</div></div>`
    console.error('WIP render error:',e)
  }
}

function renderWip(){
  let wt=D.wipTasks
  if(WIP_PERSON==='noah')wt=wt.filter(t=>t.person?.some(n=>n.toLowerCase().includes('noah')))
  if(WIP_PERSON==='tricia')wt=wt.filter(t=>t.person?.some(n=>n.toLowerCase().includes('tricia')))
  const {start,end,label}=getRange(WIP_RANGE),prm=by(D.projects)
  const ds2d=ds=>ds?ds.slice(0,10):null  // extract YYYY-MM-DD from datetime string
  const inRange=(ds,s,e)=>{if(!ds)return false;const d=new Date(ds2d(ds)+'T12:00:00');return d>=s&&d<=e}
  const wipActive=wt.filter(t=>t.status==='In progress (WIP)')
  const wipHrs=wipActive.reduce((s,t)=>s+(t.hours||0),0)
  const completed=wt.filter(t=>inRange(t.completeDate,start,end))
  const started=wt.filter(t=>inRange(t.startDate,start,end))
  const compHrs=completed.reduce((s,t)=>s+(t.hours||0),0)
  const startHrs=started.reduce((s,t)=>s+(t.hours||0),0)
  const stagnant=wipActive.filter(t=>{if(!t.startDate)return false;return Math.floor((Date.now()-new Date(ds2d(t.startDate)+'T12:00:00'))/86400000)>=7})
  const isCount=WIP_MODE==='count'
  const wipVal=isCount?wipActive.length:wipHrs
  const compVal=isCount?completed.length:compHrs
  const startVal=isCount?started.length:startHrs
  const valUnit=isCount?'tasks':'hrs'
  // Targets: WIP is always weekly (right-now cap); completion scales with date range
  const cfg=D.meta?.wipTargets||{}
  const WIP_HRS=cfg.wip_hrs_per_person||30
  const WIP_TASKS=cfg.wip_tasks_per_person||15
  const COMP_HRS=cfg.comp_hrs_per_week_per_person||30
  const COMP_TASKS=cfg.comp_tasks_per_week_per_person||15
  const personMult=WIP_PERSON==='all'?2:1
  const daysForTarget=Math.max(Math.ceil((end-start)/86400000)+1,7)
  const scaleW=daysForTarget/7
  const wipTarget=(isCount?WIP_TASKS:WIP_HRS)*personMult
  const compTarget=(isCount?Math.round(COMP_TASKS*scaleW):Math.round(COMP_HRS*scaleW))*personMult
  const allActive=wt.filter(t=>t.status==='In progress (WIP)'||t.status==='Up Next (Sprint Backlog)')
  const rockLinked=allActive.filter(t=>t.rockIds?.length>0||t.projectIds?.some(pid=>prm[pid]?.rockIds?.length>0))
  const rockPct=allActive.length>0?Math.round(rockLinked.length/allActive.length*100):0
  // Daily data
  const days=[],cur=new Date(start)
  while(cur<=end){days.push(new Date(cur));cur.setDate(cur.getDate()+1)}
  const dayStrs=days.map(d=>d.toISOString().split('T')[0])
  const dayLbls=days.map(d=>d.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'}))
  const compByDay=dayStrs.map(ds=>isCount?wt.filter(t=>ds2d(t.completeDate)===ds).length:wt.filter(t=>ds2d(t.completeDate)===ds).reduce((s,t)=>s+(t.hours||0),0))
  const startByDay=dayStrs.map(ds=>isCount?wt.filter(t=>ds2d(t.startDate)===ds).length:wt.filter(t=>ds2d(t.startDate)===ds).reduce((s,t)=>s+(t.hours||0),0))
  const velVals=completed.map(t=>t.velocity).filter(v=>v!=null&&v>0)
  const avgVelocity=velVals.length>0?(velVals.reduce((a,b)=>a+b,0)/velVals.length).toFixed(2):'—'
  const velSub=velVals.length>0?velVals.length+' task'+(velVals.length!==1?'s':'')+' measured':'no data yet'
  // Pie data
  const byPillar={},byDomain={}
  const pillarById=by(D.pillars)
  completed.forEach(t=>{
    let k='Other'
    if(t.pillarIds?.length){const p=pillarById[t.pillarIds[0]];if(p)k=p.name}
    else if(t.pc){const e=Object.entries(PC).find(([,v])=>v===t.pc);if(e)k=e[0]}
    byPillar[k]=(byPillar[k]||0)+(isCount?1:(t.hours||0))
  })
  completed.forEach(t=>{const k=t.domain||'Other';byDomain[k]=(byDomain[k]||0)+(isCount?1:(t.hours||0))})
  // Render
  const RBTNS=['week','lastweek','14days','30days']
  const RLBLS={week:'This Week',lastweek:'Last Week','14days':'14 Days','30days':'30 Days'}
  document.getElementById('vc').innerHTML=`
  <div class="vwip"><div class="vwip-inner">
    <div class="vwip-person-tabs">
      ${(()=>{
        const all=D.wipTasks,noah=all.filter(t=>t.person?.some(n=>n.toLowerCase().includes('noah'))),tricia=all.filter(t=>t.person?.some(n=>n.toLowerCase().includes('tricia')))
        const noPersonData=all.length>0&&all.every(t=>!t.person?.length)
        const diag=noPersonData?`<span class="vwip-diag">⚠ Person field empty — re-run GitHub Action, or assign tasks to Noah/Tricia in Notion</span>`:''
        return `<button class="vwip-ptab ${WIP_PERSON==='all'?'on':''}" onclick="setWipPerson('all')">Total WIP <span class="vwip-ptab-ct">${all.length}</span></button>
        <button class="vwip-ptab ${WIP_PERSON==='noah'?'on':''}" onclick="setWipPerson('noah')">Noah <span class="vwip-ptab-ct">${noah.length}</span></button>
        <button class="vwip-ptab ${WIP_PERSON==='tricia'?'on':''}" onclick="setWipPerson('tricia')">Tricia <span class="vwip-ptab-ct">${tricia.length}</span></button>${diag}`
      })()}
    </div>
    <div class="vwip-toolbar">
      <span class="vwip-toolbar-lbl">Date Range:</span>
      ${RBTNS.map(r=>`<button class="vwip-rbtn ${r===WIP_RANGE?'on':''}" onclick="setWipRange('${r}')">${RLBLS[r]}</button>`).join('')}
      <span class="vwip-rdatelbl">${fmtDate(start)} – ${fmtDate(end)}</span>
      <div style="margin-left:auto;display:flex;gap:4px;"><button class="vwip-rbtn ${WIP_MODE==='hours'?'on':''}" onclick="setWipMode('hours')">Hours</button><button class="vwip-rbtn ${WIP_MODE==='count'?'on':''}" onclick="setWipMode('count')">Count</button></div>
    </div>
    <div class="vwip-metrics">
      <div class="vwip-metric">
        <div class="vwip-mval ${!isCount&&wipHrs>wipTarget?'over':''}">${isCount?wipVal:wipHrs.toFixed(1)} <span class="vwip-mtgt">/ ${wipTarget} ${valUnit}</span></div>
        <div class="vwip-mlbl">Current WIP</div>
        <div class="vwip-prog-track"><div class="vwip-prog-fill ${!isCount&&wipHrs>wipTarget?'over':''}" style="width:${Math.min(wipVal/wipTarget*100,100).toFixed(0)}%"></div></div>
      </div>
      <div class="vwip-metric">
        <div class="vwip-mval ${compVal>=compTarget?'hit':'under'}">${isCount?compVal:compHrs.toFixed(1)} <span class="vwip-mtgt">/ ${compTarget} ${valUnit}</span></div>
        <div class="vwip-mlbl">Completed</div>
        <div class="vwip-msub">${completed.length} tasks · ${label}</div>
        <div class="vwip-prog-track"><div class="vwip-prog-fill ${compVal>=compTarget?'':'under'}" style="width:${Math.min(compVal/compTarget*100,100).toFixed(0)}%"></div></div>
      </div>
      <div class="vwip-metric">
        <div class="vwip-mval">${isCount?startVal:startVal.toFixed(1)} <span class="vwip-mtgt">${valUnit}</span></div>
        <div class="vwip-mlbl">Started</div>
        <div class="vwip-msub">${started.length} task${started.length!==1?'s':''} · ${label}</div>
      </div>
      <div class="vwip-metric ${stagnant.length>0?'warn':''}">
        <div class="vwip-mval">${stagnant.length}</div>
        <div class="vwip-mlbl">Stagnant Tasks</div>
        <div class="vwip-msub">7+ days in WIP</div>
      </div>
      <div class="vwip-metric">
        <div class="vwip-mval">${avgVelocity} <span class="vwip-mtgt">${avgVelocity!=='—'?'days':''}</span></div>
        <div class="vwip-mlbl">Avg Cycle Time (aka- Velocity)</div>
        <div class="vwip-msub">start → done · ${velSub}</div>
      </div>
    </div>
    <div class="vwip-chart-box">
      <div class="vwip-chart-title">Daily ${isCount?"Tasks":"Hours"} · ${label}</div>
      <div class="vwip-bar-wrap"><canvas id="wip-bar"></canvas></div>
    </div>
    <div class="vwip-bottom">
      <div class="vwip-pie-box">
        <div class="vwip-chart-title">By Pillar <span class="vwip-chart-sub">(completed ${isCount?"tasks":"hrs"})</span></div>
        <div class="vwip-pie-wrap"><canvas id="wip-pie1"></canvas></div>
      </div>
      <div class="vwip-pie-box">
        <div class="vwip-chart-title">By Domain <span class="vwip-chart-sub">(completed ${isCount?"tasks":"hrs"})</span></div>
        <div class="vwip-pie-wrap"><canvas id="wip-pie2"></canvas></div>
      </div>
      <div class="vwip-stat-box">
        <div class="vwip-stat-big">${rockPct}%</div>
        <div class="vwip-stat-lbl">Rock-linked</div>
        <div class="vwip-stat-sub">${rockLinked.length} of ${allActive.length} active tasks tied to a Rock</div>
      </div>
    </div>
    ${stagnant.length>0?`
    <div class="sec-hdr"><span class="sec-lbl">Stagnant Tasks</span><div class="sec-line"></div><span class="sec-cnt">${stagnant.length} task${stagnant.length!==1?'s':''} · 7+ days without progress</span></div>
    <div class="vwip-stag-list">${stagnant.map(t=>{const days=Math.floor((Date.now()-new Date(ds2d(t.startDate)+'T12:00:00'))/86400000);return`<div class="vwip-stag-row"><div class="vwip-stag-pip" style="background:${t.pc}"></div><div class="vwip-stag-name">${t.name}</div><div class="vwip-stag-meta"><span class="tag t-r">${days}d</span>${t.domain?`<span class="tag t-n">${trunc(t.domain,16)}</span>`:''}</div></div>`}).join('')}</div>`:''}
  </div></div>`

  requestAnimationFrame(()=>{
    // Bar chart
    const bc=document.getElementById('wip-bar')
    if(bc)new Chart(bc,{type:'bar',data:{labels:dayLbls,datasets:[{label:isCount?'Completed tasks':'Completed hrs',data:compByDay,backgroundColor:'rgba(74,139,112,.8)',borderRadius:4},{label:isCount?'Started tasks':'Started hrs',data:startByDay,backgroundColor:'rgba(74,123,173,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{family:'DM Sans',size:11}}}},scales:{y:{beginAtZero:true,ticks:{font:{family:'DM Sans',size:10}}},x:{ticks:{font:{family:'DM Sans',size:10}}}}}})
    // Pie 1: pillar
    const p1=document.getElementById('wip-pie1')
    if(p1&&Object.keys(byPillar).length)new Chart(p1,{type:'doughnut',data:{labels:Object.keys(byPillar),datasets:[{data:Object.values(byPillar),backgroundColor:Object.keys(byPillar).map(k=>PC[k]||'#999'),borderWidth:2,borderColor:'#FDFAF6'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:10},boxWidth:11,padding:7}},tooltip:{callbacks:{label:(ctx)=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);const pct=tot>0?Math.round(ctx.parsed/tot*100):0;return ` ${ctx.label}: ${ctx.parsed.toFixed(1)}h (${pct}%)`}}}}}})
    // Pie 2: domain
    const DCOLS=['#7B6FAC','#B5695A','#4A8B70','#A07848','#4A7BAD','#6E8C8A','#C48B3A','#8B7355','#9E6B8A','#6B8E9E']
    const p2=document.getElementById('wip-pie2')
    if(p2&&Object.keys(byDomain).length)new Chart(p2,{type:'doughnut',data:{labels:Object.keys(byDomain),datasets:[{data:Object.values(byDomain),backgroundColor:DCOLS.slice(0,Object.keys(byDomain).length),borderWidth:2,borderColor:'#FDFAF6'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:10},boxWidth:11,padding:7}},tooltip:{callbacks:{label:(ctx)=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);const pct=tot>0?Math.round(ctx.parsed/tot*100):0;return ` ${ctx.label}: ${ctx.parsed.toFixed(1)}h (${pct}%)`}}}}}})
  })
}
</script>

function renderHab(){
  const person=D.habitData?.[HAB_PERSON]
  const fields=person?.fields||[]
  const allEntries=person?.entries||[]

  // ── Month data ──────────────────────────────────────────
  const daysInMonth=new Date(HAB_YEAR,HAB_MONTH+1,0).getDate()
  const monthStr=`${HAB_YEAR}-${String(HAB_MONTH+1).padStart(2,'0')}`
  const monthEntries=allEntries.filter(e=>e.date?.startsWith(monthStr))
  const entryMap=Object.fromEntries(monthEntries.map(e=>[e.date,e]))

  // ── Stats ────────────────────────────────────────────────
  const tracked=monthEntries.length
  const totalPossible=tracked*fields.length
  const totalCompleted=monthEntries.reduce((s,e)=>s+e.completed,0)
  const avgPct=tracked?Math.round(monthEntries.reduce((s,e)=>s+e.pct,0)/tracked):0
  const daysAt100=monthEntries.filter(e=>e.pct===100).length
  const today=new Date()
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`
  const todayEntry=entryMap[todayStr]

  // ── Day of week offset (Mon=0) ───────────────────────────
  const firstDow=(new Date(HAB_YEAR,HAB_MONTH,1).getDay()+6)%7 // Mon=0

  // ── Build day array with DOW ─────────────────────────────
  // Pad with nulls before the 1st
  const calDays=[...Array(firstDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)]
  // Pad to complete last week
  while(calDays.length%7!==0)calDays.push(null)
  const weeks=[]
  for(let i=0;i<calDays.length;i+=7)weeks.push(calDays.slice(i,i+7))

  // ── Per-habit stats ──────────────────────────────────────
  const habitStats=fields.map(f=>{
    const comp=monthEntries.filter(e=>e.habits[f]===true).length
    const pct=tracked?Math.round(comp/tracked*100):0
    return{name:f,comp,total:tracked,pct}
  }).sort((a,b)=>b.pct-a.pct)

  // ── Weekly stats ─────────────────────────────────────────
  const weekStats=weeks.map((wk,wi)=>{
    const wDays=wk.filter(Boolean)
    const wEntries=wDays.map(d=>entryMap[`${monthStr}-${String(d).padStart(2,'0')}`]).filter(Boolean)
    const wPct=wEntries.length?Math.round(wEntries.reduce((s,e)=>s+e.pct,0)/wEntries.length):null
    const wComp=wEntries.reduce((s,e)=>s+e.completed,0)
    const wPoss=wEntries.length*fields.length
    return{wi,wPct,wComp,wPoss,label:`Week ${wi+1}`}
  })

  // ── Daily pct array for charts ───────────────────────────
  const dailyPcts=Array.from({length:daysInMonth},(_,i)=>{
    const ds=`${monthStr}-${String(i+1).padStart(2,'0')}`
    return entryMap[ds]?.pct??null
  })

  // ── Top 5 habits ─────────────────────────────────────────
  const top5=habitStats.slice(0,5)

  // ── Color helpers ─────────────────────────────────────────
  const hc=p=>p>=80?HAB_GD:p>=60?'#7A9A3A':'#C05030'
  const isFuture=d=>new Date(HAB_YEAR,HAB_MONTH,d)>today

  // ── Calendar cells HTML ──────────────────────────────────
  const cellHtml=(f,d)=>{
    if(!d)return`<td style="width:22px;"></td>`
    const ds=`${monthStr}-${String(d).padStart(2,'0')}`
    const entry=entryMap[ds]
    const future=isFuture(d)
    if(future||!entry)return`<td style="width:22px;padding:1px;"><div style="width:18px;height:18px;border-radius:3px;background:${future?'transparent':'#EBEBEB'};border:${future?'none':'1px solid #DDD'}"></div></td>`
    const done=entry.habits[f]
    return`<td style="width:22px;padding:1px;"><div style="width:18px;height:18px;border-radius:3px;background:${done?HAB_G:'#EBEBEB'};border:${done?'none':'1px solid #DDD'};display:flex;align-items:center;justify-content:center;">${done?`<span style="color:#fff;font-size:11px;font-weight:700;line-height:1">✓</span>`:''}</div></td>`
  }

  // ── Render ────────────────────────────────────────────────
  const canPrev=HAB_MONTH>0||HAB_YEAR<new Date().getFullYear()
  const canNext=!(HAB_YEAR===new Date().getFullYear()&&HAB_MONTH>=new Date().getMonth())

  document.getElementById('vc').innerHTML=`
  <div style="height:100%;overflow:auto;padding:16px 20px 40px;background:#F5F8F5;font-family:'DM Sans',sans-serif;">
  <div style="max-width:1200px;margin:0 auto;">

  <!-- Person tabs + Month nav -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="display:flex;gap:6px;">

      <button onclick="setHabPerson('tricia')" style="padding:6px 18px;border:1.5px solid ${HAB_PERSON==='tricia'?HAB_G:'#C8D8C8'};border-radius:20px;background:${HAB_PERSON==='tricia'?HAB_G:'transparent'};color:${HAB_PERSON==='tricia'?'#fff':'#5A7A5A'};font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;">Tricia</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">

        <div style="background:${HAB_GH};border-radius:6px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff;">Year</span>
          <span style="font-size:12px;font-weight:700;color:#fff;">${HAB_YEAR}</span>
        </div>
        <div style="margin-top:10px;font-size:11px;color:#7A8A7A;">
          <div style="margin-bottom:3px;">${tracked} days tracked</div>
          <div style="margin-bottom:3px;">${fields.length} habits</div>
          <div>${daysAt100} days at 100%</div>
        </div>
      </div>
    </div>

    <!-- Area chart -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:16px 18px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#7A9A7A;margin-bottom:12px;text-align:center;">Progress Over Time</div>
      <div style="position:relative;height:120px;"><canvas id="hab-area"></canvas></div>
    </div>

    <!-- Overall donut -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#7A9A7A;margin-bottom:10px;text-align:center;">Daily Habits</div>
      <div style="position:relative;width:110px;height:110px;">
        <canvas id="hab-donut-main" style="position:absolute;inset:0;"></canvas>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div style="font-size:26px;font-weight:700;color:${hc(avgPct)};font-family:'Playfair Display',serif;line-height:1;">${tracked?avgPct+'%':'—'}</div>
        </div>
      </div>
      ${tracked?`<div style="font-size:11px;color:#8A9A8A;margin-top:8px;">${totalCompleted} / ${totalPossible}</div>`:''}
    </div>
  </div>

  <!-- Main: Calendar + Progress bars -->
  <div style="display:grid;grid-template-columns:1fr 200px;gap:12px;margin-bottom:12px;">

    <!-- Calendar grid -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:14px 16px;overflow-x:auto;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7A9A7A;margin-bottom:10px;">Daily Habit Calendar</div>
      <table style="border-collapse:collapse;min-width:100%;">
        <thead>
          <!-- Week headers -->
          <tr>
            <th style="width:155px;"></th>
            ${weeks.map((wk,wi)=>`<th colspan="7" style="text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:${HAB_GH};padding:5px 2px;border-left:2px solid #E8F0E8;">Week ${wi+1}</th>`).join('')}
          </tr>
          <!-- Day number headers -->
          <tr>
            <th style="text-align:left;font-size:9px;font-weight:600;color:#9AAA9A;padding-bottom:4px;padding-right:6px;">HABIT</th>
            ${weeks.map(wk=>wk.map(d=>`<th style="width:22px;text-align:center;font-size:9px;color:${d?(isFuture(d)?'#CCC':'#888'):'transparent'};padding:2px 1px;">${d||''}</th>`).join('')).join('')}
          </tr>
          <!-- Day of week headers -->
          <tr>
            <th></th>
            ${weeks.map(wk=>wk.map((_,i)=>`<th style="width:22px;text-align:center;font-size:8px;color:#AAA;padding-bottom:5px;">${DOW[i]}</th>`).join('')).join('')}
          </tr>
        </thead>
        <tbody>
          ${fields.map(f=>`
          <tr>
            <td style="font-size:11px;color:#3A4A3A;padding:1px 6px 1px 0;white-space:nowrap;overflow:hidden;max-width:155px;text-overflow:ellipsis;">${f}</td>
            ${weeks.map(wk=>wk.map(d=>cellHtml(f,d)).join('')).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- Habit progress bars -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:14px 15px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7A9A7A;margin-bottom:4px;">Habit Progress</div>
      ${tracked?`<div style="font-size:10px;color:#8A9A8A;margin-bottom:10px;">${totalCompleted} / ${totalPossible}</div>`:''}
      ${habitStats.map(h=>`
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <div style="font-size:10px;color:#3A4A3A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;">${h.name}</div>
          <div style="font-size:10px;font-weight:700;color:${hc(h.pct)};flex-shrink:0;margin-left:4px;">${h.pct}%</div>
        </div>
        <div style="height:6px;background:#EEF0EE;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${h.pct}%;background:${hc(h.pct)};border-radius:3px;"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <!-- Bottom: Monthly summary + Weekly donuts -->
  <div style="display:grid;grid-template-columns:200px 1fr;gap:12px;">

    <!-- Monthly summary -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:14px 15px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7A9A7A;margin-bottom:10px;">${MONTH_NAMES[HAB_MONTH]} Progress</div>
      <div style="position:relative;width:80px;height:80px;margin:0 auto 10px;">
        <canvas id="hab-donut-month" style="position:absolute;inset:0;"></canvas>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
          <div style="font-size:18px;font-weight:700;color:${hc(avgPct)};font-family:'Playfair Display',serif;">${tracked?avgPct+'%':'—'}</div>
        </div>
      </div>
      <div style="font-size:10px;color:#8A9A8A;text-align:center;margin-bottom:8px;">Completed: ${totalCompleted} / ${totalPossible}</div>
      ${[{l:'COMPLETED',v:totalCompleted},{l:'POSSIBLE',v:totalPossible},{l:'TRACKED DAYS',v:tracked}].map(r=>`
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #E8EEE8;font-size:10px;">
        <span style="color:#7A8A7A;">${r.l}</span><span style="font-weight:600;color:#3A4A3A;">${r.v}</span>
      </div>`).join('')}
    </div>

    <!-- Weekly donuts -->
    <div style="background:#fff;border-radius:12px;border:1px solid #D8E8D8;padding:14px 16px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7A9A7A;margin-bottom:12px;">Weekly Breakdown</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${weekStats.map((ws,wi)=>`
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px;">
          <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7A9A7A;">${ws.label}</div>
          <div style="position:relative;width:80px;height:80px;">
            <canvas id="hab-donut-w${wi}" style="position:absolute;inset:0;"></canvas>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
              <div style="font-size:16px;font-weight:700;color:${ws.wPct!=null?hc(ws.wPct):'#CCC'};font-family:'Playfair Display',serif;">${ws.wPct!=null?ws.wPct+'%':'—'}</div>
            </div>
          </div>
          <div style="font-size:10px;color:#8A9A8A;">${ws.wComp}/${ws.wPoss}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  </div></div>`

  // ── Charts ────────────────────────────────────────────────
  requestAnimationFrame(()=>{
    const dayLabels=Array.from({length:daysInMonth},(_,i)=>i+1)

    // Area chart
    const aCtx=document.getElementById('hab-area')
    if(aCtx)new Chart(aCtx,{type:'line',data:{labels:dayLabels,datasets:[{data:dailyPcts.map(p=>p??0),borderColor:HAB_G,backgroundColor:HAB_GBG+'CC',fill:'origin',tension:.35,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}%`}}},scales:{y:{min:0,max:100,ticks:{font:{family:'DM Sans',size:9},callback:v=>v+'%',stepSize:50},grid:{color:'rgba(100,140,100,.1)'}},x:{ticks:{font:{family:'DM Sans',size:9},maxTicksLimit:8},grid:{display:false}}}}})

    // Donut helper
    const mkDonut=(id,pct,size=110)=>{
      const c=document.getElementById(id)
      if(!c)return
      const p=pct??0
      new Chart(c,{type:'doughnut',data:{datasets:[{data:[p,100-p],backgroundColor:[p>=80?HAB_GD:p>=60?HAB_GL:'#E08060','#EEEEEE'],borderWidth:0}]},options:{cutout:'72%',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}}}})
    }
    mkDonut('hab-donut-main',avgPct)
    mkDonut('hab-donut-month',avgPct,80)
    weekStats.forEach((ws,wi)=>mkDonut(`hab-donut-w${wi}`,ws.wPct,80))
  })
}
</script>
