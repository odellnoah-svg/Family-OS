<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eubanks Family OS · Vision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F2EB;--surf:#FDFAF6;--surf2:#EDE6DA;--bdr:#DDD4C4;--tx:#261C10;--tx2:#7A6A54;--tx3:#B0A08C;--acc:#7C5738;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
.sc-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:6px;}
.sc-sub{font-size:13px;color:var(--tx2);margin-bottom:28px;}
.dots{display:flex;gap:7px;}.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:blink 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}
.info-box{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:36px 40px;max-width:440px;text-align:center;}
.ib-icon{font-size:28px;margin-bottom:12px;}.ib-head{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:8px;}
.ib-body{font-size:13px;color:var(--tx2);line-height:1.65;}.ib-steps{text-align:left;margin-top:16px;}
.ib-steps li{font-size:12.5px;color:var(--tx2);margin-bottom:5px;line-height:1.5;}.ib-steps strong{color:var(--tx);}
.ib-code{font-size:11px;color:var(--tx3);margin-top:10px;font-family:monospace;}
#app{display:flex;flex-direction:column;height:100vh;}
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);height:56px;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
.hdr-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.hdr-brand em{font-weight:400;font-style:italic;color:var(--tx2);}
.hdr-stats{display:flex;gap:12px;flex-shrink:0;}
.stat{text-align:center;}.stat-n{font-size:15px;font-weight:500;line-height:1;}
.stat-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.view-tabs{display:flex;gap:4px;flex:1;justify-content:center;}
.vtab{padding:5px 12px;border:1px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .14s;white-space:nowrap;}
.vtab:hover{background:var(--surf2);color:var(--tx);}
.vtab.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.updated{font-size:10.5px;color:var(--tx3);white-space:nowrap;}
.hdr-btn{padding:5px 11px;border:1px solid var(--bdr);border-radius:7px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;}
.hdr-btn:hover{background:var(--surf2);color:var(--tx);}
#vc{flex:1;overflow:hidden;position:relative;}
/* Shared card */
.card{background:var(--surf);border:1px solid var(--bdr);border-left:4px solid var(--pc,var(--bdr));border-radius:10px;padding:11px 13px 10px;cursor:pointer;display:flex;flex-direction:column;transition:transform .12s,box-shadow .14s,opacity .15s;}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(38,28,16,.08);}
.card.dim{opacity:.15;pointer-events:none;}.card.sel{border-color:var(--pc,var(--acc));border-left-color:var(--pc,var(--acc));box-shadow:0 3px 18px rgba(38,28,16,.1);}
.card.noclk{cursor:default;}.card.noclk:hover{transform:none;box-shadow:none;}
.card.orphan{border-style:dashed;background:var(--bg);}
.card-k{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:3px;}
.card-n{font-size:12.5px;font-weight:500;line-height:1.4;color:var(--tx);margin-bottom:7px;}
.card-d{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:7px;}
.card-tgs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;}
.card-w{font-size:10px;color:var(--tx3);font-style:italic;margin-bottom:5px;}
.card-ft{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px;border-top:1px solid var(--bdr);}
.card-c{font-size:10.5px;color:var(--tx3);}.card-arr{font-size:12px;color:var(--tx3);transition:transform .12s,color .12s;}
.card:not(.noclk):hover .card-arr{transform:translateX(2px);color:var(--pc,var(--acc));}
/* Tags */
.tag{font-size:9.5px;font-weight:500;padding:2px 7px;border-radius:20px;}
.t-g{background:#E6F4EE;color:#2A7050;}.t-y{background:#FFF3E0;color:#B06820;}.t-r{background:#FFEEED;color:#A83428;}
.t-b{background:#EBF2FB;color:#2C5FA0;}.t-n{background:var(--surf2);color:var(--tx2);}.t-s{background:#EDF0F2;color:#4A6070;}
/* V1 COLUMNS */
.v1{display:flex;flex-direction:column;height:100%;}
.v1-bar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;height:38px;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.v1-bar-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-right:2px;}
.ctog{padding:3px 9px;border:1px solid var(--bdr);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;}
.ctog.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.ctog:hover:not(.on){background:var(--surf2);}
.v1-scroll{flex:1;overflow:auto;padding:18px 20px;position:relative;}
.v1-inner{display:flex;gap:36px;align-items:flex-start;width:max-content;min-width:100%;position:relative;}
#v1svg{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible;}
.v1col{width:240px;flex-shrink:0;position:relative;z-index:2;}
.v1ch{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);padding:0 2px 9px;display:flex;align-items:center;gap:6px;}
.v1cn{background:var(--surf2);border-radius:9px;padding:1px 6px;font-size:10px;color:var(--tx2);}
.v1 .card{margin-bottom:7px;}
/* V2 NESTED */
.v2{height:100%;overflow-y:auto;padding:20px 28px 48px;}
.v2-in{max-width:860px;margin:0 auto;}
.v2p{margin-bottom:10px;border:1px solid var(--bdr);border-radius:13px;overflow:hidden;}
.v2ph{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;background:var(--surf);transition:background .12s;user-select:none;}
.v2ph:hover{background:var(--surf2);}
.v2pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.v2pn{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;flex:1;}
.v2pm{display:flex;gap:5px;align-items:center;}
.v2chv{font-size:14px;color:var(--tx3);transition:transform .2s;flex-shrink:0;font-weight:400;}
.v2bod{background:var(--bg);padding:0 18px;}
.v2bod.open{padding:10px 18px 14px;}
.v2g{margin-bottom:7px;border:1px solid var(--bdr);border-left:3px solid var(--pc,var(--bdr));border-radius:9px;overflow:hidden;background:var(--surf);}
.v2gh{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;transition:background .12s;}
.v2gh:hover{background:var(--surf2);}
.v2gn{font-size:12.5px;font-weight:500;flex:1;line-height:1.35;}
.v2gbod{background:var(--bg);padding:0 13px;}
.v2gbod.open{padding:8px 13px 10px;}
.v2r{display:flex;align-items:flex-start;gap:7px;padding:7px 11px;border:1px solid var(--bdr);border-radius:7px;margin-bottom:5px;background:var(--surf);}
.v2rp{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.v2rn{font-size:11.5px;color:var(--tx);line-height:1.4;flex:1;}
.v2rt{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.v2em{font-size:12px;color:var(--tx3);font-style:italic;padding:6px 0;}
/* V3 SWIMLANES */
.v3{display:flex;height:100%;overflow-x:auto;overflow-y:hidden;}
.v3lane{min-width:210px;flex:1;display:flex;flex-direction:column;border-right:1px solid var(--bdr);overflow-y:auto;}
.v3lane:last-child{border-right:none;}
.v3lh{padding:12px 14px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--surf);position:sticky;top:0;z-index:5;border-top:3px solid var(--pc,var(--bdr));}
.v3ln{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.v3lp{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.v3ls{font-size:10px;color:var(--tx3);margin-top:2px;}
.v3lb{padding:10px;}
.v3goal{margin-bottom:9px;}
.v3gn{font-size:11.5px;font-weight:500;color:var(--tx);padding:6px 9px;background:var(--surf);border:1px solid var(--bdr);border-left:3px solid var(--pc,var(--bdr));border-radius:7px;margin-bottom:3px;line-height:1.4;}
.v3rs{padding-left:9px;}
.v3r{font-size:10.5px;color:var(--tx2);padding:4px 8px;background:var(--bg);border:1px solid var(--bdr);border-radius:5px;margin-bottom:3px;line-height:1.4;display:flex;align-items:flex-start;gap:4px;}
.v3rp{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.v3em{font-size:10.5px;color:var(--tx3);font-style:italic;padding:6px 0;text-align:center;}
[hidden]{display:none!important;}
</style>
</head>
<body>
<div class="screen" id="scr-loading">
  <div class="sc-title">Eubanks Family OS</div>
  <div class="sc-sub" id="load-msg">Loading…</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div class="screen" id="scr-nodata" hidden>
  <div class="info-box">
    <div class="ib-icon">🌱</div><div class="ib-head">Ready to grow</div>
    <div class="ib-body">Run the GitHub Action to load your Notion data.
      <ol class="ib-steps">
        <li>Add secret <strong>NOTION_TOKEN</strong> in GitHub Settings</li>
        <li><strong>Actions → Sync Notion Data → Run workflow</strong></li>
        <li>Reload this page once complete</li>
      </ol>
    </div>
  </div>
</div>
<div class="screen" id="scr-error" hidden>
  <div class="info-box">
    <div class="ib-icon">⚠</div><div class="ib-head">Couldn't load data</div>
    <div class="ib-body">Could not read data.json.</div>
    <div class="ib-code" id="err-msg"></div>
  </div>
</div>
<div id="app" hidden>
  <header class="hdr">
    <div class="hdr-brand">Eubanks Family OS <em>· Vision</em></div>
    <div class="hdr-stats" id="hdr-stats"></div>
    <div class="view-tabs">
      <button class="vtab on" onclick="sv('columns')"   id="vt-columns">Columns</button>
      <button class="vtab"    onclick="sv('nested')"    id="vt-nested">Nested</button>
      <button class="vtab"    onclick="sv('swimlanes')" id="vt-swimlanes">Swimlanes</button>

    </div>
    <div class="hdr-right">
      <div class="updated" id="updated-ts"></div>
      <button class="hdr-btn" onclick="reload()">↺ Reload</button>
    </div>
  </header>
  <div id="vc"></div>
</div>
<script>
// ── CONFIG ───────────────────────────────────────
const PC={'Faith & Character':'#7B6FAC','Marriage & Family':'#B5695A','Health & Energy':'#4A8B70','Home/Homestead':'#A07848','Freedom & Ownership':'#4A7BAD','Systems & Simplicity':'#6E8C8A','Adventure & Community':'#C48B3A'}

// ── STATE ────────────────────────────────────────
let D={pillars:[],goals:[],rocks:[],projects:[],tasks:[]}
let ALL={} // merged id→item lookup
let CV='columns' // current view
let COLVIS={pillars:true,goals:true,rocks:true,projects:true,tasks:true}
let V1SEL=null
let V2EXP=new Set()

// ── BOOT ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded',init)
async function init(){so('scr-loading');try{await load();so('app');renderHdr();sv('columns')}catch(e){if(e.message==='NO_DATA')so('scr-nodata');else{document.getElementById('err-msg').textContent=e.message;so('scr-error')}}}
async function reload(){so('scr-loading');try{await load();so('app');renderHdr();sv(CV)}catch(e){if(e.message==='NO_DATA')so('scr-nodata');else{document.getElementById('err-msg').textContent=e.message;so('scr-error')}}}
function so(id){['scr-loading','scr-nodata','scr-error','app'].forEach(s=>document.getElementById(s).hidden=s!==id)}

// ── DATA ─────────────────────────────────────────
async function load(){
  const res=await fetch('./data.json?v='+Date.now())
  if(!res.ok)throw new Error('data.json not found (HTTP '+res.status+')')
  const data=await res.json()
  if(!data.generated)throw new Error('NO_DATA')
  D={pillars:data.pillars||[],goals:data.goals||[],rocks:data.rocks||[],projects:data.projects||[],tasks:data.tasks||[],_ts:data.generated}
  colorize()
}
function colorize(){
  const pm=by(D.pillars),gm=by(D.goals),rm=by(D.rocks),prm=by(D.projects)
  D.pillars.forEach(p=>{p.type='pillar';p.color=PC[p.name]||'#8B7355';p.pc=p.color})
  D.goals.forEach(g=>{g.type='goal';const a=g.pillarIds?.map(i=>pm[i]).find(Boolean),b=D.pillars.find(p=>p.goalIds?.includes(g.id));g.pc=(a||b)?.color||'#8B7355'})
  D.rocks.forEach(r=>{r.type='rock';const a=r.pillarIds?.map(i=>pm[i]).find(Boolean),b=r.goalIds?.map(i=>gm[i]).find(Boolean),c=D.goals.find(g=>g.rockIds?.includes(r.id));r.pc=a?.color||b?.pc||c?.pc||'#8B7355'})
  D.projects.forEach(pr=>{pr.type='project';const a=pr.rockIds?.map(i=>rm[i]).find(Boolean),b=D.rocks.find(r=>r.projectIds?.includes(pr.id));pr.pc=(a||b)?.pc||'#8B7355'})
  D.tasks.forEach(t=>{t.type='task';const a=t.projectIds?.map(i=>prm[i]).find(Boolean),b=D.projects.find(p=>p.taskIds?.includes(t.id));t.pc=a?.pc||b?.pc||PC[t.pillar]||'#8B7355'})
  ALL={...by(D.pillars),...by(D.goals),...by(D.rocks),...by(D.projects),...by(D.tasks)}
}
const by=arr=>Object.fromEntries(arr.map(x=>[x.id,x]))

// ── RELATIONSHIP HELPERS (bidirectional) ─────────
const goalsOf =p=>D.goals.filter(g=>p.goalIds?.includes(g.id)||g.pillarIds?.includes(p.id))
const rocksOf =g=>D.rocks.filter(r=>g.rockIds?.includes(r.id)||r.goalIds?.includes(g.id))
const projsOf =r=>D.projects.filter(p=>r.projectIds?.includes(p.id)||p.rockIds?.includes(r.id))
const tasksOf=pr=>D.tasks.filter(t=>pr.taskIds?.includes(t.id)||t.projectIds?.includes(pr.id))

// ── CHAIN ─────────────────────────────────────────
function chain(id){
  const out=new Set(),item=ALL[id]
  if(!item)return out
  function dn(n){
    if(n.type==='pillar') goalsOf(n).forEach(g=>{out.add(g.id);dn(g)})
    if(n.type==='goal')   rocksOf(n).forEach(r=>{out.add(r.id);dn(r)})
    if(n.type==='rock')   projsOf(n).forEach(p=>{out.add(p.id);dn(p)})
    if(n.type==='project')tasksOf(n).forEach(t=>{out.add(t.id)})
  }
  function up(n){
    if(n.type==='goal'){n.pillarIds?.forEach(i=>{if(ALL[i])out.add(i)});D.pillars.filter(p=>p.goalIds?.includes(n.id)).forEach(p=>out.add(p.id))}
    if(n.type==='rock'){[...(n.goalIds?.map(i=>ALL[i]).filter(Boolean)||[]),...D.goals.filter(g=>g.rockIds?.includes(n.id))].forEach(g=>{out.add(g.id);up(g)})}
    if(n.type==='project'){[...(n.rockIds?.map(i=>ALL[i]).filter(Boolean)||[]),...D.rocks.filter(r=>r.projectIds?.includes(n.id))].forEach(r=>{out.add(r.id);up(r)})}
    if(n.type==='task'){[...(n.projectIds?.map(i=>ALL[i]).filter(Boolean)||[]),...D.projects.filter(p=>p.taskIds?.includes(n.id))].forEach(p=>{out.add(p.id);up(p)})}
  }
  dn(item);up(item);return out
}

// ── SHARED UTILS ──────────────────────────────────
function tags(item,type){
  const sc=s=>({'Healthy':'t-g','On Track':'t-g','Complete':'t-g','Needs Attention':'t-y','At Risk':'t-y','Paused':'t-y','Neglected':'t-r','Dropped':'t-r','Active':'t-b','Not Started':'t-n'})[s]||'t-n'
  const t=(c,l)=>`<span class="tag ${c}">${l}</span>`,p=[]
  if(type==='pillar'&&item.status)p.push(t(sc(item.status),item.status))
  if(type==='goal'){if(item.horizon)p.push(t('t-n',item.horizon));if(item.status)p.push(t(sc(item.status),item.status))}
  if(type==='rock'&&item.quarter)p.push(t('t-n',item.quarter+(item.year?' '+item.year:'')))
  if(type==='project'&&item.status)p.push(t(sc(item.status),item.status))
  if(type==='task'){const w=item.status==='In progress (WIP)';p.push(t(w?'t-b':'t-n',w?'In WIP':'Up Next'));if(item.domain)p.push(t('t-n',item.domain));if(item.hours)p.push(t('t-s',item.hours+'h'))}
  return p.join('')
}
function ccount(item,type){
  const id=item.id
  if(type==='pillar'){const n=goalsOf(item).length;return n?`${n} goal${n!==1?'s':''}`:'No goals linked'}
  if(type==='goal'){const n=rocksOf(item).length;return n?`${n} rock${n!==1?'s':''}`:'No rocks linked'}
  if(type==='rock'){const n=projsOf(item).length;return n?`${n} project${n!==1?'s':''}`:'No projects linked'}
  if(type==='project'){const n=tasksOf(item).length;return n?`${n} active task${n!==1?'s':''}`:'No active tasks'}
  return ''
}
function orphan(item,type){
  if(type==='goal')return !item.pillarIds?.length&&!D.pillars.find(p=>p.goalIds?.includes(item.id))
  if(type==='rock')return !item.goalIds?.length&&!D.goals.find(g=>g.rockIds?.includes(item.id))
  if(type==='project')return !item.rockIds?.length&&!D.rocks.find(r=>r.projectIds?.includes(item.id))
  return false
}
const stag=s=>{const sc=s=>({'Healthy':'t-g','On Track':'t-g','Complete':'t-g','Needs Attention':'t-y','At Risk':'t-y','Paused':'t-y','Neglected':'t-r','Dropped':'t-r','Active':'t-b','Not Started':'t-n'})[s]||'t-n';return s?`<span class="tag ${sc(s)}">${s}</span>`:''}
const trunc=(s,n)=>s&&s.length>n?s.slice(0,n)+'…':(s||'')
const cap=s=>s?s[0].toUpperCase()+s.slice(1):''

function renderHdr(){
  const counts=[['Pillars',D.pillars.length],['Goals',D.goals.length],['Rocks',D.rocks.length],['Projects',D.projects.length],['Tasks',D.tasks.length]]
  document.getElementById('hdr-stats').innerHTML=counts.map(([l,n])=>`<div class="stat"><div class="stat-n">${n}</div><div class="stat-l">${l}</div></div>`).join('')
  if(D._ts){const d=new Date(D._ts);document.getElementById('updated-ts').textContent=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
}

// ── VIEW SWITCHER ─────────────────────────────────
function sv(name){
  CV=name
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('on'))
  document.getElementById('vt-'+name)?.classList.add('on')
  const views={columns:v1Render,nested:v2Render,swimlanes:v3Render}
  views[name]?.()
}

// ═══════════════════════════════════════
// VIEW 1 — COLUMNS
// ═══════════════════════════════════════
function v1Render(){
  const COLS=[{k:'pillars',l:'Pillars',items:D.pillars},{k:'goals',l:'Goals',items:D.goals},{k:'rocks',l:'Rocks',items:D.rocks},{k:'projects',l:'Projects',items:D.projects},{k:'tasks',l:'Tasks',items:D.tasks}]
  document.getElementById('vc').innerHTML=`
    <div class="v1">
      <div class="v1-bar">
        <span class="v1-bar-lbl">Show:</span>
        ${COLS.map(c=>`<button class="ctog ${COLVIS[c.k]?'on':''}" onclick="v1TogCol('${c.k}')">${c.l}</button>`).join('')}
        <span style="margin-left:8px;font-size:10px;color:var(--tx3)">· Click a card to trace its chain</span>
      </div>
      <div class="v1-scroll" id="v1sc" onscroll="v1Draw()">
        <div class="v1-inner" id="v1in">
          <svg id="v1svg"></svg>
          ${COLS.map(c=>`<div class="v1col ${COLVIS[c.k]?'':'hidden'}" id="v1col-${c.k}"></div>`).join('')}
        </div>
      </div>
    </div>`
  v1FillCols()
  setTimeout(v1Draw,120)
  document.getElementById('v1sc').addEventListener('scroll',v1Draw)
}
function v1FillCols(){
  const COLS=[{k:'pillars',l:'Pillars',items:D.pillars,type:'pillar'},{k:'goals',l:'Goals',items:D.goals,type:'goal'},{k:'rocks',l:'Rocks',items:D.rocks,type:'rock'},{k:'projects',l:'Projects',items:D.projects,type:'project'},{k:'tasks',l:'Tasks',items:D.tasks,type:'task'}]
  COLS.forEach(({k,l,items,type})=>{
    const col=document.getElementById('v1col-'+k)
    if(!col)return
    const inChain=V1SEL?chain(V1SEL):null
    if(V1SEL)inChain.add(V1SEL)
    col.innerHTML=`<div class="v1ch">${l}<span class="v1cn">${items.length}</span></div>`+
      items.map(item=>{
        const color=item.pc||item.color||'#8B7355'
        const isOrph=orphan(item,type)
        const isDim=V1SEL&&!inChain.has(item.id)
        const isSel=V1SEL===item.id
        return `<div class="card ${isDim?'dim':''} ${isSel?'sel':''} ${isOrph?'orphan':''} ${type==='task'?'noclk':''}"
          id="v1c-${item.id}" data-id="${item.id}" style="--pc:${color}"
          onclick="v1Sel('${item.id}')">
          <div class="card-k">${cap(type)}</div>
          <div class="card-n">${item.name}</div>
          <div class="card-tgs">${tags(item,type)}</div>
          ${isOrph?`<div class="card-w">⚠ Not fully linked</div>`:''}
          <div class="card-ft"><span class="card-c">${ccount(item,type)}</span>${type!=='task'?'<span class="card-arr">→</span>':''}</div>
        </div>`
      }).join('')
  })
}
function v1TogCol(k){
  COLVIS[k]=!COLVIS[k]
  const col=document.getElementById('v1col-'+k)
  const btn=document.querySelector(`.ctog[onclick*="${k}"]`)
  if(col)col.hidden=!COLVIS[k]
  if(btn)btn.classList.toggle('on',COLVIS[k])
  v1Draw()
}
function v1Sel(id){
  V1SEL=V1SEL===id?null:id
  v1FillCols()
  v1Draw()
}
function v1Draw(){
  const row=document.getElementById('v1in'),svg=document.getElementById('v1svg')
  if(!row||!svg)return
  svg.setAttribute('width',row.scrollWidth);svg.setAttribute('height',row.scrollHeight)
  svg.style.width=row.scrollWidth+'px';svg.style.height=row.scrollHeight+'px'
  const inC=V1SEL?chain(V1SEL):null
  if(V1SEL)inC.add(V1SEL)
  const line=(fid,tid,color)=>{
    const fi=ALL[fid],ti=ALL[tid]
    if(!fi||!ti)return''
    if(!COLVIS[fi.type+'s']||!COLVIS[ti.type+'s'])return''
    const fa=document.getElementById('v1c-'+fid),ta=document.getElementById('v1c-'+tid)
    if(!fa||!ta)return''
    const rr=row.getBoundingClientRect(),fr=fa.getBoundingClientRect(),tr=ta.getBoundingClientRect()
    const x1=fr.right-rr.left,y1=(fr.top+fr.bottom)/2-rr.top,x2=tr.left-rr.left,y2=(tr.top+tr.bottom)/2-rr.top
    const cx=(x2-x1)*.44,lit=!V1SEL||(inC.has(fid)&&inC.has(tid))
    const op=lit?(V1SEL?.8:.18):.03,sw=lit&&V1SEL?2.2:1.5
    return `<path d="M${x1},${y1} C${x1+cx},${y1} ${x2-cx},${y2} ${x2},${y2}" stroke="${color}" stroke-width="${sw}" fill="none" stroke-opacity="${op}" stroke-linecap="round"/>`
  }
  const paths=[]
  D.pillars.forEach(p=>goalsOf(p).forEach(g=>paths.push(line(p.id,g.id,p.color))))
  D.goals.forEach(g=>rocksOf(g).forEach(r=>paths.push(line(g.id,r.id,g.pc))))
  D.rocks.forEach(r=>projsOf(r).forEach(pr=>paths.push(line(r.id,pr.id,r.pc))))
  D.projects.forEach(pr=>tasksOf(pr).forEach(t=>paths.push(line(pr.id,t.id,pr.pc))))
  svg.innerHTML=paths.join('')
}
window.addEventListener('resize',()=>{if(CV==='columns')v1Draw()})

// ═══════════════════════════════════════
// VIEW 2 — NESTED
// ═══════════════════════════════════════
function v2Render(){
  let h='<div class="v2"><div class="v2-in">'
  D.pillars.forEach(p=>{
    const goals=goalsOf(p),pe=V2EXP.has(p.id)
    h+=`<div class="v2p">
      <div class="v2ph" onclick="v2tog('${p.id}')">
        <div class="v2pip" style="background:${p.color}"></div>
        <div class="v2pn">${p.name}</div>
        <div class="v2pm">${stag(p.status)}<span class="tag t-n">${goals.length} goal${goals.length!==1?'s':''}</span></div>
        <div class="v2chv" id="v2ch-${p.id}" style="${pe?'transform:rotate(90deg)':''}">›</div>
      </div>
      <div class="v2bod ${pe?'open':''}" id="v2b-${p.id}" ${pe?'':'hidden'}>`
    if(!goals.length){h+=`<div class="v2em">No goals linked to this pillar yet.</div>`}
    else goals.forEach(g=>{
      const rocks=rocksOf(g),ge=V2EXP.has(g.id)
      h+=`<div class="v2g" style="--pc:${g.pc}">
        <div class="v2gh" onclick="v2tog('${g.id}')">
          <div class="v2gn">${g.name}</div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">${g.horizon?`<span class="tag t-n">${g.horizon}</span>`:''} ${stag(g.status)}<span class="tag t-n">${rocks.length} rock${rocks.length!==1?'s':''}</span></div>
          <div class="v2chv" id="v2ch-${g.id}" style="margin-left:6px;${ge?'transform:rotate(90deg)':''}">›</div>
        </div>
        <div class="v2gbod ${ge?'open':''}" id="v2b-${g.id}" ${ge?'':'hidden'}>`
      if(!rocks.length){h+=`<div class="v2em">No rocks linked to this goal yet.</div>`}
      else rocks.forEach(r=>{
        h+=`<div class="v2r">
          <div class="v2rp" style="background:${r.pc}"></div>
          <div><div class="v2rn">${r.name}</div><div class="v2rt">${r.quarter?`<span class="tag t-n">${r.quarter}${r.year?' '+r.year:''}</span>`:''}</div></div>
        </div>`
      })
      h+=`</div></div>`
    })
    h+=`</div></div>`
  })
  h+='</div></div>'
  document.getElementById('vc').innerHTML=h
}
function v2tog(id){
  const body=document.getElementById('v2b-'+id),chv=document.getElementById('v2ch-'+id)
  if(!body)return
  if(V2EXP.has(id)){V2EXP.delete(id);body.hidden=true;if(chv)chv.style.transform=''}
  else{V2EXP.add(id);body.hidden=false;if(chv)chv.style.transform='rotate(90deg)'}
}

// ═══════════════════════════════════════
// VIEW 3 — SWIMLANES
// ═══════════════════════════════════════
function v3Render(){
  let h='<div class="v3">'
  D.pillars.forEach(p=>{
    const goals=goalsOf(p)
    h+=`<div class="v3lane" style="--pc:${p.color}">
      <div class="v3lh">
        <div class="v3ln"><div class="v3lp" style="background:${p.color}"></div>${p.name}</div>
        <div class="v3ls">${goals.length} goal${goals.length!==1?'s':''}</div>
      </div>
      <div class="v3lb">`
    if(!goals.length){h+=`<div class="v3em">No goals yet</div>`}
    else goals.forEach(g=>{
      const rocks=rocksOf(g)
      h+=`<div class="v3goal">
        <div class="v3gn" style="--pc:${g.pc}">${g.name}</div>`
      if(rocks.length){
        h+=`<div class="v3rs">`
        rocks.forEach(r=>{h+=`<div class="v3r"><div class="v3rp" style="background:${r.pc}"></div>${trunc(r.name,50)}</div>`})
        h+=`</div>`
      }
      h+=`</div>`
    })
    h+=`</div></div>`
  })
  h+='</div>'
  document.getElementById('vc').innerHTML=h
}

</script>
